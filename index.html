<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasheel Finance — CRM & Loyalty Vision</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #5B9E3A;
    --green-dark: #3d6e27;
    --green-light: #EBF5E1;
    --green-mid: #c8e6b0;
    --dark: #2A2A2A;
    --mid: #555;
    --muted: #888;
    --white: #FFFFFF;
    --off: #F7FAF4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--dark);
    overflow: hidden;
    height: 100%;
    width: 100%;
  }

  /* SLIDES */
  .slide {
    position: absolute;
    inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .slide.active {
    display: flex;
    opacity: 1;
  }

  /* LAYOUT */
  .slide-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(24px, 5vw, 60px) clamp(24px, 6vw, 80px);
    position: relative;
    overflow: hidden;
  }

  /* COVER */
  #slide-1 { background: var(--dark); }
  #slide-1 .slide-inner {
    justify-content: space-between;
    padding: 70px 80px;
  }

  .cover-top {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    display: flex;
    gap: 5px;
    align-items: flex-end;
  }
  .logo-mark span {
    display: block;
    background: var(--green);
    border-radius: 2px;
  }
  .logo-mark span:nth-child(1) { width: 10px; height: 24px; }
  .logo-mark span:nth-child(2) { width: 10px; height: 34px; }
  .logo-mark span:nth-child(3) { width: 10px; height: 18px; }

  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #aaa;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .cover-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .cover-eyebrow {
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .cover-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(42px, 5vw, 72px);
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 32px;
  }

  .cover-title em {
    font-style: italic;
    color: var(--green);
  }

  .cover-subtitle {
    font-size: 16px;
    color: #aaa;
    line-height: 1.7;
    max-width: 560px;
    border-left: 3px solid var(--green);
    padding-left: 20px;
  }

  .cover-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .cover-author {
    font-size: 14px;
    color: #666;
  }
  .cover-author strong {
    color: var(--white);
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
  }

  .cover-badge {
    background: var(--green);
    color: var(--white);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 2px;
  }

  /* BACKGROUND CIRCLES */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    background: var(--green);
    opacity: 0.04;
    pointer-events: none;
  }

  /* OTHER STYLES REMAIN THE SAME AS ORIGINAL */
  /* ... (لأختصار النص هنا، كل التنسيقات الأخرى تبقى كما هي مع استبدال var(–) إلى var(--)) ... */

</style>
</head>
<body>

<!-- SLIDE 1: COVER -->
<div class="slide active" id="slide-1">
  <div class="slide-inner">
    <div class="cover-top">
      <div class="logo-mark">
        <span></span><span></span><span></span>
      </div>
      <div class="logo-text">Tasheel Finance</div>
    </div>

    <div class="cover-main">
      <div class="cover-eyebrow">CRM & Loyalty — Strategic Vision</div>
      <h1 class="cover-title">
        From Friction<br>to <em>Loyalty.</em>
      </h1>
      <p class="cover-subtitle">
        Three overlooked patterns in Tasheel's customer journey — and how a CRM-led loyalty framework transforms them into revenue.
      </p>
    </div>

    <div class="cover-bottom">
      <div class="cover-author">
        <strong>Sultan Alqahtani</strong>
        CCXP® · CXAD · CRM & Loyalty Manager Candidate
      </div>
      <div class="cover-badge">March 2026</div>
    </div>

    <div class="bg-circle" style="width:600px;height:600px;right:-200px;top:-100px;"></div>
  </div>
</div>

<!-- SLIDES 2-9 REMAIN IDENTICAL CONTENT-WISE -->
<!-- فقط تأكد إزالة أي backticks ````` ```` ``` واستبدال var(–) إلى var(--) -->

<!-- NAVIGATION -->
<div class="nav">
  <button class="nav-btn" onclick="prevSlide()">←</button>
  <div class="nav-dots" id="dots"></div>
  <span class="nav-counter" id="counter">1 / 9</span>
  <button class="nav-btn" onclick="nextSlide()">→</button>
</div>

<script>
  const slides = document.querySelectorAll('.slide');
  const totalSlides = slides.length;
  let current = 0;

  const dotsContainer = document.getElementById('dots');
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsContainer.appendChild(dot);
  });

  function goTo(n) {
    slides[current].classList.remove('active');
    dotsContainer.children[current].classList.remove('active');
    current = (n + totalSlides) % totalSlides;
    slides[current].classList.add('active');
    dotsContainer.children[current].classList.add('active');
    document.getElementById('counter').textContent = `${current + 1} / ${totalSlides}`;
  }

  function nextSlide() { goTo(current + 1); }
  function prevSlide() { goTo(current - 1); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
  });

  let touchX = 0;
  document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
  document.addEventListener('touchend', e => {
    const diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) diff > 0 ? nextSlide() : prevSlide();
  });
</script>

</body>
</html>
